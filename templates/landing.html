<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Portal | As Sharp As You Get</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .landing-container {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.5) 0%, rgba(0, 0, 0, 0.3) 100%),
                        url('{{ url_for("static", filename="images/MET_Nashik.jpg.jpeg") }}') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .landing-header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            display: flex;
            align-items: center;
        }

        .landing-header img {
            height: 64px;
            width: auto;
            display: block;
            margin: 0 50px;
        }
        .landing-content {
            text-align: center;
            color: white;
            z-index: 10;
            max-width: 900px;
            padding: 20px;
            animation: fadeInUp 1s ease-out;
        }

        .landing-content h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 30px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
            letter-spacing: 1px;
            animation: slideDown 0.8s ease-out;
            color: #830419;
        }

        .landing-content p {
            font-size: 1.5rem;
            margin-bottom: 40px;
            font-weight: 300;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.7);
            animation: slideUp 0.8s ease-out 0.2s both;
        }

        .login-btn {
            display: inline-block;
            padding: 15px 50px;
            font-size: 1.1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #c41e3a 0%, #830419 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            border: 2px solid transparent;
            transition: all 0.4s ease;
            animation: slideUp 0.8s ease-out 0.4s both;
            cursor: pointer;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #c41e3a 0%, #ee3c5a 100%);
            transform: translateY(-3px);
            color: white;
            text-decoration: none;
        }

        .login-btn:active {
            transform: translateY(-1px);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Floating animation for decorative elements */
        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .landing-content h1 {
                font-size: 2.5rem;
                margin-bottom: 20px;
            }

            .landing-content p {
                font-size: 1.1rem;
                margin-bottom: 30px;
            }

            .login-btn {
                padding: 12px 40px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .landing-content h1 {
                font-size: 1.8rem;
                margin-bottom: 15px;
            }

            .landing-content p {
                font-size: 0.95rem;
                margin-bottom: 25px;
            }

            .login-btn {
                padding: 10px 30px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body>
    <div class="landing-container">
        <div class="landing-header">
            <a href="{{ url_for('home') }}">
                <img src="{{ url_for('static', filename='images/header_met_logo.jpeg') }}" alt="MET Logo">
            </a>
        </div>
        <div class="landing-content">
            <h1>As Sharp As You Can Get</h1>
            <p>Excellence in Education & Professional Growth</p>
            <a href="{{ url_for('auth.login') }}" class="login-btn">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </a>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
