<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register | Alumni Portal</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <!-- Bootstrap Override CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-override.css') }}">

    <!-- Toastr CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        h4 {
            color: #ffffff;
            font-weight: 700;
        }

        h3 {
            color: #c41e3a;
            font-weight: 700;
        }

        a {
            color: #c41e3a;
            text-decoration: none;
        }

        a:hover {
            color: #8b0000;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">

                <div class="card shadow-lg">
                    <div class="card-header text-center">
                        <h4 class="mb-0">Alumni Portal Registration</h4>
                        <small>Create your account</small>
                    </div>

                    <div class="card-body p-4">
                        <form id="registerForm" novalidate>

                            <!-- BASIC INFO -->
                            <div class="section-title">Basic Information</div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label required">First Name</label>
                                    <input type="text" name="first_name" id="first_name" class="form-control"
                                        maxlength="255">
                                    <div class="invalid-feedback"></div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label required">Last Name</label>
                                    <input type="text" name="last_name" id="last_name" class="form-control"
                                        maxlength="255">
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label required">Email Address</label>
                                <input type="email" name="email" id="email" class="form-control">
                                <div class="invalid-feedback"></div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label required">Password</label>
                                    <div class="position-relative">
                                        <input type="password" name="password" id="password" class="form-control">
                                        <div class="invalid-feedback"></div>
                                        <span class="password-toggle" tabindex="0" role="button" aria-pressed="false"
                                            aria-label="Show password">
                                            Show Password
                                        </span>
                                    </div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label required">Confirm Password</label>
                                    <div class="position-relative">
                                        <input type="password" name="confirm_password" id="confirm_password"
                                            class="form-control">
                                        <div class="invalid-feedback"></div>
                                        <span class="password-toggle" tabindex="0" role="button" aria-pressed="false"
                                            aria-label="Show password">
                                            <i class="bi bi-eye"></i> Show Password
                                        </span>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Profile Photo</label>
                                <input type="file" name="profile_photo" id="profile_photo" class="form-control" 
                                    accept=".png,.jpg,.jpeg,.webp">
                                <small class="form-text text-muted">
                                    Allowed formats: PNG, JPG, JPEG, WEBP (Max 1 MB)
                                </small>
                                <div class="invalid-feedback"></div>
                            </div>

                            <!-- ROLE -->
                            <div class="section-title">Role Selection</div>

                            <div class="mb-3">
                                <label class="form-label required">Register As</label>
                                <select id="role" name="role" class="form-select">
                                    <option value="">Select Role</option>
                                    <option value="alumni">Alumni</option>
                                    <option value="student">Student</option>
                                    <option value="faculty">Faculty</option>
                                </select>
                                <div class="invalid-feedback"></div>
                            </div>

                            <!-- ALUMNI -->
                            <div id="alumniFields" class="d-none">
                                <div class="section-title">Alumni Details</div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label required">Passout Year</label>
                                        <input type="text" name="passout_year" id="passout_year" class="form-control" placeholder="e.g., 2020">
                                        <div class="invalid-feedback"></div>
                                    </div>

                                    <div class="col-md-6 mb-3">
                                        <label class="form-label required">Department</label>
                                        <select id="alumni_department" name="alumni_department" class="form-select">
                                            <option value="">Select Department</option>
                                            <option>Computer Engineering</option>
                                            <option>IT Engineering</option>
                                            <option>Mechanical Engineering</option>
                                            <option>Civil Engineering</option>
                                            <option>Electrical Engineering</option>
                                        </select>
                                        <div class="invalid-feedback"></div>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label required">Current Company</label>
                                        <input type="text" name="current_company" id="current_company"
                                            class="form-control" maxlength="255">
                                        <div class="invalid-feedback"></div>
                                    </div>

                                    <div class="col-md-6 mb-3">
                                        <label class="form-label required">Designation</label>
                                        <input type="text" name="designation" id="designation" class="form-control">
                                        <div class="invalid-feedback"></div>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label required">Phone Number</label>
                                        <input type="text" name="alumni_phone_number" id="alumni_phone_number"
                                            class="form-control" maxlength="20">
                                        <div class="invalid-feedback"></div>
                                    </div>

                                    <div class="col-md-6 mb-3">
                                        <label class="form-label required">LinkedIn Profile URL</label>
                                        <input type="text" name="alumni_linkedin_profile" id="alumni_linkedin_profile"
                                            class="form-control">
                                        <div class="invalid-feedback"></div>
                                    </div>
                                </div>
                            </div>

                            <!-- STUDENT -->
                            <div id="studentFields" class="d-none">
                                <div class="section-title">Student Details</div>

                                <div class="mb-3">
                                    <label class="form-label required">GR Number</label>
                                    <input type="text" name="gr_no" id="gr_no" class="form-control">
                                    <div class="invalid-feedback"></div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label required">Department</label>
                                    <select id="department" name="department" class="form-select">
                                        <option value="">Select Department</option>
                                        <option>Computer Engineering</option>
                                        <option>IT Engineering</option>
                                        <option>Mechanical Engineering</option>
                                        <option>Civil Engineering</option>
                                        <option>Electrical Engineering</option>
                                    </select>
                                    <div class="invalid-feedback"></div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label required">Batch Year</label>
                                    <select id="batch_year" name="batch_year" class="form-select">
                                        <option value="">Select Batch Year</option>
                                        <option>First Year</option>
                                        <option>Second Year</option>
                                        <option>Third Year</option>
                                    </select>
                                    <div class="invalid-feedback"></div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Skills (Optional)</label>
                                    <textarea id="skills" name="skills" class="form-control"></textarea>
                                    <div class="invalid-feedback"></div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label required">Phone Number</label>
                                        <input type="text" name="phone_number" id="phone_number"
                                            class="form-control" maxlength="20">
                                        <div class="invalid-feedback"></div>
                                    </div>

                                    <div class="col-md-6 mb-3">
                                        <label class="form-label required">LinkedIn Profile URL</label>
                                        <input type="text" name="student_linkedin_profile" id="student_linkedin_profile"
                                            class="form-control">
                                        <div class="invalid-feedback"></div>
                                    </div>
                                </div>
                            </div>

                            <!-- FACULTY -->
                            <div id="facultyFields" class="d-none">
                                <div class="section-title">Faculty Details</div>

                                <div class="mb-3">
                                    <label class="form-label required">Faculty ID</label>
                                    <input type="text" name="faculty_id" id="faculty_id" class="form-control">
                                    <div class="invalid-feedback"></div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label required">Department</label>
                                    <select id="faculty_department" name="faculty_department" class="form-select">
                                        <option value="">Select Department</option>
                                        <option>Computer Engineering</option>
                                        <option>IT Engineering</option>
                                        <option>Mechanical Engineering</option>
                                        <option>Civil Engineering</option>
                                        <option>Electrical Engineering</option>
                                    </select>
                                    <div class="invalid-feedback"></div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label required">Designation</label>
                                    <input type="text" name="faculty_designation" id="faculty_designation"
                                        class="form-control">
                                    <div class="invalid-feedback"></div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label required">Phone Number</label>
                                        <input type="text" name="faculty_phone_number" id="faculty_phone_number"
                                            class="form-control" maxlength="20">
                                        <div class="invalid-feedback"></div>
                                    </div>

                                    <div class="col-md-6 mb-3">
                                        <label class="form-label required">LinkedIn Profile URL</label>
                                        <input type="text" name="faculty_linkedin_profile" id="faculty_linkedin_profile"
                                            class="form-control">
                                        <div class="invalid-feedback"></div>
                                    </div>
                                </div>
                            </div>

                            <!-- SUBMIT -->
                            <div class="d-grid mt-4">
                                <button type="submit" id="submitBtn" class="btn-primary" disabled>
                                    Create Account
                                </button>
                            </div>
                            <!-- LOGIN LINK -->
                            <div class="text-center mt-3">
                                Already have an account?
                                <a href="{{ url_for('auth.login') }}">Login here</a>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <!-- jQuery (required by Toastr) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Toastr JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>

</html>
