<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login | Alumni Portal</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <!-- Bootstrap Override CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-override.css') }}">

    <!-- Toastr CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">

    <style>
        h3 {
            color: #c41e3a;
            font-weight: 700;
        }

        a {
            color: #c41e3a;
            text-decoration: none;
        }

        a:hover {
            color: #8b0000;
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .login-image {
                display: none;
            }

            .auth-card {
                width: 95%;
            }
        }
    </style>
</head>

<body>

    <div class="auth-wrapper">
        <div class="login-card-wrapper">
            <div class="auth-card">

                <div class="login-image">
                    <img src="{{ url_for('static', filename='images/MET_Logo1.jpeg') }}" alt="MET Logo">
                </div>

                <div class="auth-form">
                <div class="w-100">
                    <h3 class="text-center mb-4">Login to Alumni Portal</h3>

                    <form id="loginForm" novalidate>

                            <div class="mb-3">
                                <label class="form-label required">Email Address</label>
                                <input type="email" id="login_email" name="email" class="form-control">
                                <div class="invalid-feedback"></div>
                            </div>

                            <div class="mb-3 position-relative">
                                <label class="form-label required">Password</label>
                                <input type="password" id="login_password" name="password" class="form-control">
                                <div class="invalid-feedback"></div>
                                <!-- Text + Icon toggle (kept after feedback so JS validation targets feedback correctly) -->
                                <span class="password-toggle" id="togglePassword" tabindex="0" role="button"
                                    aria-pressed="false" aria-label="Show password">
                                    <i class="bi bi-eye"></i> Show Password
                                </span>
                            </div>

                            <div class="d-grid mt-4">
                                <button type="submit" id="loginBtn" class="btn-primary" disabled>
                                    Login
                                </button>
                            </div>

                        </form>

                        <div class="text-center mt-3">
                            New user?
                            <a href="{{ url_for('auth.register') }}">Register here</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- jQuery (required by Toastr) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Toastr JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

    <script>
        toastr.options = {
            "closeButton": true,
            "progressBar": true,
            "positionClass": "toast-top-right",
            "timeOut": "4000"
        };

        (function () {
            var flashes = {{ get_flashed_messages(with_categories = true) | tojson | safe
        }};
        for (var i = 0; i < flashes.length; i++) {
            var category = flashes[i][0];
            var message = flashes[i][1];
            if (category === 'success') toastr.success(message);
            else if (category === 'info') toastr.info(message);
            else if (category === 'warning') toastr.warning(message);
            else if (category === 'danger' || category === 'error') toastr.error(message);
            else toastr.info(message);
        }
            }) ();
    </script>

    <!-- External JS -->
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>

</body>

</html>
